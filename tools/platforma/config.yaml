module:
  name: platforma
  version: 0.1.0
  api_version: 1
  versioning:
    bump_types:
      - major
      - minor
      - patch
    sync_check:
      enforce_semver: true
      enforce_pyproject_alignment: true
      enforce_service_naming: true
  migrations:
    filename_pattern: "NNN_name.sql"
    state_dir: tools/platforma/state/migrations
    safety:
      block_drop_table: true
      block_drop_column: true

defaults:
  env: local
  profile: core

profiles:
  core:
    targets:
      - users
      - orders
      - notifications
      - gateway
