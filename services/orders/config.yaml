service_key: orders
service: platforma-svc-orders
version: 0.1.0
runtime: python
local:
  config_env:
    APP_HOST: 0.0.0.0
    APP_PORT: 50303
    SERVICE_NAME: platforma-svc-orders
    APP_MESSAGE: "Hello from orders service"
platforma:
  dependencies: [users]
  capabilities: [run, lint, test, build-image]
  commands:
    run: python3 src/main.py
    lint: python3 -c "import ast,pathlib; ast.parse(pathlib.Path(\"src/main.py\").read_text())"
    test: python3 -m unittest discover -s tests -p 'test_*.py'
  health:
    path: /health
